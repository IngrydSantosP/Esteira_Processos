
{% extends "base.html" %}

{% block title %}Login Candidato{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login Candidato</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        
        <div class="mb-6">
            <label for="senha" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
            <input type="password" id="senha" name="senha" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
        
        <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700">
            Entrar
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="{{ url_for('cadastro_candidato') }}" class="text-green-600 hover:text-green-800">
            Não tem conta? Cadastre-se
        </a>
    </div>
</div>
{% endblock %}
