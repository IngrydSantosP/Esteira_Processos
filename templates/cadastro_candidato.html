{% extends "base.html" %}

{% block title %}Cadastro Candidato{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Cadastro Candidato</h2>

    <form method="POST">
        <div class="mb-4">
            <label for="nome" class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
            <input type="text" id="nome" name="nome" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <div class="mb-4">
            <label for="telefone" class="block text-sm font-medium text-gray-700 mb-2">Telefone</label>
            <input type="tel" id="telefone" name="telefone" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <div class="mb-4">
            <label for="linkedin" class="block text-sm font-medium text-gray-700 mb-2">LinkedIn</label>
            <input type="url" id="linkedin" name="linkedin" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <div class="mb-4">
            <label for="pretensao_salarial" class="block text-sm font-medium text-gray-700 mb-2">Pretensão Salarial (R$)</label>
            <input type="number" id="pretensao_salarial" name="pretensao_salarial" step="0.01" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <div class="mb-6">
            <label for="senha" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
            <input type="password" id="senha" name="senha" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md 
                          focus:outline-none focus:ring-2 focus:ring-yellow-200">
        </div>

        <button type="submit" 
                class="w-full bg-yellow-100 text-yellow-900 font-semibold py-2 px-4 rounded-md 
                       hover:bg-yellow-200 transition-colors duration-200">
            Cadastrar
        </button>
    </form>

    <div class="mt-4 text-center">
        <a href="{{ url_for('login_candidato') }}" 
           class="text-yellow-900 hover:text-yellow-700 transition-colors duration-200">
            Já tem conta? Faça login
        </a>
    </div>
</div>
{% endblock %}
