<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaBOO! - Vagas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-50 text-gray-800">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold text-purple-800">Va<span class="text-black">BOO!</span></h1>
      <ul class="flex gap-6 text-sm font-medium">
        <li><a href="#" class="text-gray-700 hover:text-purple-600">Home</a></li>
        <li><a href="#" class="text-gray-700 hover:text-purple-600">Vagas</a></li>
        <li><a href="#" class="text-gray-700 hover:text-purple-600">Sobre</a></li>
      </ul>
      <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-full text-sm hover:bg-purple-700">
        Cadastrar-se
      </a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="container mx-auto flex flex-col-reverse md:flex-row items-center px-4 py-16">
    <!-- Left: Text -->
    <div class="md:w-1/2 text-center md:text-left">
      <h2 class="text-3xl md:text-4xl font-bold mb-4">Tá em busca<br>de uma <span class="text-purple-600">Vaga?</span></h2>
      <p class="text-lg mb-6">Conheça a VaBOO!</p>
      <a href="#" class="bg-purple-600 text-white px-6 py-3 rounded-full font-medium hover:bg-purple-700">
        Ver vagas
      </a>
    </div>

    <!-- Right: Image -->
    <div class="md:w-1/2 flex justify-center mb-8 md:mb-0">
      <img src="/static/img/vaboo-mulher.png" alt="Mulher com notebook" class="w-72 h-auto rounded-xl shadow-lg">
    </div>
  </section>

</body>
</html>
