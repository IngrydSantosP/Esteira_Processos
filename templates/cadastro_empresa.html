
{% extends "base.html" %}

{% block title %}Cadastro Empresa{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Cadastro Empresa</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label for="cnpj" class="block text-sm font-medium text-gray-700 mb-2">CNPJ</label>
            <input type="text" id="cnpj" name="cnpj" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="nome" class="block text-sm font-medium text-gray-700 mb-2">Nome da Empresa</label>
            <input type="text" id="nome" name="nome" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-6">
            <label for="senha" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
            <input type="password" id="senha" name="senha" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
            Cadastrar
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="{{ url_for('login_empresa') }}" class="text-blue-600 hover:text-blue-800">
            Já tem conta? Faça login
        </a>
    </div>
</div>
{% endblock %}
