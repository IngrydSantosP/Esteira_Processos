{% extends "base.html" %}

{% block title %}Editar Vaga{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Editar Vaga</h2>
        <a href="{{ url_for('dashboard_empresa') }}" 
           class="text-purple-800 hover:text-purple-900 transition-colors duration-200">
            ← Voltar ao Dashboard
        </a>
    </div>

    <form method="POST">
        <div class="mb-4">
            <label for="titulo" class="block text-sm font-medium text-gray-700 mb-2">Título da Vaga</label>
            <input type="text" id="titulo" name="titulo" value="{{ vaga[2] }}" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>

        <div class="mb-4">
            <label for="descricao" class="block text-sm font-medium text-gray-700 mb-2">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400">{{ vaga[3] }}</textarea>
        </div>

        <div class="mb-4">
            <label for="requisitos" class="block text-sm font-medium text-gray-700 mb-2">Requisitos (separados por vírgula)</label>
            <textarea id="requisitos" name="requisitos" rows="3" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400">{{ vaga[4] }}</textarea>
        </div>

        <div class="mb-6">
            <label for="salario_oferecido" class="block text-sm font-medium text-gray-700 mb-2">Salário Oferecido (R$)</label>
            <input type="number" id="salario_oferecido" name="salario_oferecido" value="{{ vaga[5] }}" step="0.01" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>

        <button type="submit" 
            class="bg-purple-200 text-purple-900 font-semibold px-6 py-2 rounded hover:bg-purple-300 transition-colors duration-200">
            Salvar Alterações
        </button>
    </form>
</div>
{% endblock %}
