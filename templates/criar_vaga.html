
{% extends "base.html" %}

{% block title %}Criar Vaga{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6">Criar Nova Vaga</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label for="titulo" class="block text-sm font-medium text-gray-700 mb-2">Título da Vaga</label>
            <input type="text" id="titulo" name="titulo" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="descricao" class="block text-sm font-medium text-gray-700 mb-2">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        
        <div class="mb-4">
            <label for="requisitos" class="block text-sm font-medium text-gray-700 mb-2">
                Requisitos (separados por vírgula)
            </label>
            <input type="text" id="requisitos" name="requisitos" required
                   placeholder="Ex: Python, Flask, SQL, Git"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-6">
            <label for="salario_oferecido" class="block text-sm font-medium text-gray-700 mb-2">
                Salário Oferecido (R$)
            </label>
            <input type="number" id="salario_oferecido" name="salario_oferecido" step="0.01" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                Criar Vaga
            </button>
            <a href="{{ url_for('dashboard_empresa') }}" class="bg-gray-600 text-white px-6 py-2 rounded hover:bg-gray-700">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
