{% extends "base.html" %}

{% block title %}Login Empresa{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login Empresa</h2>

    <form method="POST">
        <div class="mb-4">
            <label for="cnpj" class="block text-sm font-medium text-gray-700 mb-2">CNPJ</label>
            <input type="text" id="cnpj" name="cnpj" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none 
                          focus:ring-2 focus:ring-purple-200">
        </div>

        <div class="mb-6">
            <label for="senha" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
            <input type="password" id="senha" name="senha" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none 
                          focus:ring-2 focus:ring-purple-200">
        </div>

        <button type="submit" 
                class="w-full bg-purple-200 text-purple-800 font-semibold py-2 px-4 rounded-md 
                       hover:bg-purple-300 transition-colors duration-200">
            Entrar
        </button>
    </form>

    <div class="mt-4 text-center">
        <a href="{{ url_for('cadastro_empresa') }}" 
           class="text-purple-800 hover:text-purple-600 transition-colors duration-200">
            Não tem conta? Cadastre-se
        </a>
    </div>
</div>
{% endblock %}
